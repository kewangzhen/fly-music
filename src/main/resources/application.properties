spring.application.name=fly-music
server.port=8080

# 数据库配置
spring.datasource.url=jdbc:mysql://10.0.245.120:3306/fly_music?useUnicode=true&characterEncoding=utf-8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
spring.datasource.username=pupumall
spring.datasource.password=pupu2018#666
spring.datasource.driver-class-name=com.mysql.jdbc.Driver

# JPA配置
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Redis配置
spring.redis.host=localhost
spring.redis.port=6379
spring.redis.password=
spring.redis.database=0

# 文件上传配置
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# 歌曲存储配置
song.storage.path=./songs
song.url.prefix=/api/songs/file/
cover.storage.path=./covers
cover.url.prefix=/api/covers/

# 封面提取配置（启动时是否提取歌曲封面，默认关闭）
flymusic.cover-extraction.enabled=false

# 元数据提取配置（启动时是否从MP3提取歌曲元数据，默认关闭）
flymusic.metadata-extraction.enabled=false

# JWT配置
jwt.secret=flymusicsecretkey
jwt.expiration=86400000

# AI服务配置
ai.api.key=your_api_key_here
ai.api.provider=musicgen  # suno/udio/elevenlabs/musicgen
ai.api.endpoint=https://api.suno.ai
ai.music.duration.default=60
ai.music.duration.max=180

# MusicGen本地服务配置
ai.musicgen.enabled=false
ai.musicgen.service.url=http://localhost:5000

# ACE-Step服务配置
ai.acestep.enabled=false
ai.acestep.service.url=http://localhost:5001

# UDIO API 服务配置
ai.udio.enabled=false
ai.udio.api.key=your_udio_api_key
ai.udio.api.url=https://api.udioapi.pro

# Mureka API 服务配置
ai.mureka.enabled=false
ai.mureka.api.key=your_mureka_api_key
ai.mureka.api.url=https://api.mureka.cn