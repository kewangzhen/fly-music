spring.application.name=fly-music
server.port=8080

# 数据库配置
spring.datasource.url=jdbc:mysql://localhost:3306/fly_music?useUnicode=true&characterEncoding=utf-8&useSSL=false
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.jdbc.Driver

# JPA配置
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Redis配置
spring.redis.host=localhost
spring.redis.port=6379
spring.redis.password=
spring.redis.database=0

# 文件上传配置
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# 歌曲存储配置
song.storage.path=./songs
song.url.prefix=/api/songs/file/

# JWT配置
jwt.secret=flymusicsecretkey
jwt.expiration=86400000

# AI服务配置
ai.api.key=your_api_key_here